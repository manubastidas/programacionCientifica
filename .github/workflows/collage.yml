name: Generar collage

on:
  push:
    branches:
      - main
    paths:
      - 'Ejercicios/actividad3/plots/**.jpg'

jobs:
  collage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar collage.md
        run: python Ejercicios/actividad3/make_collage.py

      - name: Commit y push collage.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ejercicios/actividad3/plots/collage.md
          git diff --staged --quiet || git commit -m "chore: update collage [skip ci]"
          git push
